# Optional Render Blueprint — create a Web Service from this repo.
# Set all environment variables in the Render dashboard (do not commit secrets).
services:
  - type: web
    name: samarth-surveyos-api
    runtime: node
    plan: starter
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_OPTIONS
        value: --max-old-space-size=384
      - key: WEB_CONCURRENCY
        value: "1"
      # Set in Render dashboard to your Vercel URL (comma-separated if multiple):
      # FRONTEND_ORIGIN=https://survey-app-chi-wheat.vercel.app,http://localhost:5173
      - key: FRONTEND_ORIGIN
        sync: false
